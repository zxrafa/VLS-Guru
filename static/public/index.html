<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga VLS — Portal Oficial</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        dark: {
                            base: '#050508',
                            card: '#09090e',
                        },
                        neon: {
                            pink: '#ff0055',
                            cyan: '#06b6d4',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS styles for scrollbars and active transitions -->
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050508;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: #050508;
            overflow-x: hidden;
        }
    </style>

    <!-- Import Map para garantir única instância de React compartilhada -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0/client",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "framer-motion": "https://esm.sh/framer-motion@10.16.4?deps=react@18.2.0"
        }
      }
    </script>
    
    <!-- Babel Standalone para transpilação JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="text-white min-h-screen">
    <div id="root">
        <!-- Loader inicial sutil caso a rede demore para carregar os scripts -->
        <div class="flex items-center justify-center min-h-screen bg-[#050508]">
            <div class="flex flex-col items-center gap-4">
                <i class="fa-solid fa-shield-halved text-4xl text-[#ff0055] animate-pulse"></i>
                <span class="text-sm font-semibold tracking-wider text-slate-400">CARREGANDO PORTAL VLS...</span>
            </div>
        </div>
    </div>

    <!-- Script React rodando sobre ESM compilado por Babel -->
    <script type="text/babel" data-presets="react" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';

        const easeCurve = [0.16, 1, 0.3, 1];

        const containerVariants = {
            hidden: { opacity: 0 },
            visible: {
                opacity: 1,
                transition: {
                    staggerChildren: 0.08,
                    ease: easeCurve
                }
            }
        };

        const itemVariants = {
            hidden: { opacity: 0, y: 30, filter: "blur(10px)" },
            visible: { 
                opacity: 1, 
                y: 0, 
                filter: "blur(0px)",
                transition: { duration: 0.8, ease: easeCurve }
            }
        };

        function App() {
            const [activeTab, setActiveTab] = useState("championship");
            const [championships, setChampionships] = useState([]);
            const [selectedCampId, setSelectedCampId] = useState("");
            const [matches, setMatches] = useState([]);
            const [news, setNews] = useState([]);
            const [leaguePlayers, setLeaguePlayers] = useState([]);
            const [countdown, setCountdown] = useState({ days: 2, hours: 14, minutes: 32, seconds: 45 });

            // Timer para contagem regressiva
            useEffect(() => {
                const interval = setInterval(() => {
                    setCountdown(prev => {
                        if (prev.seconds > 0) return { ...prev, seconds: prev.seconds - 1 };
                        if (prev.minutes > 0) return { ...prev, minutes: prev.minutes - 1, seconds: 59 };
                        if (prev.hours > 0) return { ...prev, hours: prev.hours - 1, minutes: 59, seconds: 59 };
                        if (prev.days > 0) return { ...prev, days: prev.days - 1, hours: 23, minutes: 59, seconds: 59 };
                        return prev;
                    });
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Busca de dados
            useEffect(() => {
                fetchChampionships();
                fetchNews();
            }, []);

            useEffect(() => {
                if (selectedCampId) {
                    fetchMatches(selectedCampId);
                    fetchLeaguePlayers(selectedCampId);
                } else {
                    setMatches([]);
                    setLeaguePlayers([]);
                }
            }, [selectedCampId]);

            const fetchChampionships = async () => {
                try {
                    const res = await fetch("/api/public/campeonatos");
                    if (res.ok) {
                        const data = await res.json();
                        setChampionships(data);
                        const active = data.filter(c => c.ativo);
                        if (active.length > 0) {
                            setSelectedCampId(active[0].id);
                        }
                    }
                } catch (err) {
                    console.error("Erro ao carregar campeonatos:", err);
                }
            };

            const fetchNews = async () => {
                try {
                    const res = await fetch("/api/public/noticias");
                    if (res.ok) {
                        const data = await res.json();
                        setNews(data);
                    }
                } catch (err) {
                    console.error("Erro ao carregar notícias:", err);
                }
            };

            const fetchMatches = async (campId) => {
                try {
                    const res = await fetch(`/api/public/partidas?campeonato_id=${campId}`);
                    if (res.ok) {
                        const data = await res.json();
                        setMatches(data);
                    }
                } catch (err) {
                    console.error("Erro ao carregar partidas:", err);
                }
            };

            const fetchLeaguePlayers = async (campId) => {
                try {
                    const res = await fetch(`/api/public/jogadores_liga?campeonato_id=${campId}`);
                    if (res.ok) {
                        const data = await res.json();
                        setLeaguePlayers(data);
                    }
                } catch (err) {
                    console.error("Erro ao carregar artilharia:", err);
                }
            };

            // Processa classificação
            const calculateStandings = () => {
                const table = {};
                matches.forEach(m => {
                    if (!m.encerrada || m.gols_casa === null || m.gols_fora === null) return;
                    if (!table[m.time_casa]) table[m.time_casa] = { nome: m.time_casa, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, pts: 0, form: [] };
                    if (!table[m.time_fora]) table[m.time_fora] = { nome: m.time_fora, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0, pts: 0, form: [] };

                    const tc = table[m.time_casa];
                    const tf = table[m.time_fora];

                    tc.j += 1;
                    tf.j += 1;
                    tc.gp += m.gols_casa;
                    tc.gc += m.gols_fora;
                    tf.gp += m.gols_fora;
                    tf.gc += m.gols_casa;

                    if (m.gols_casa > m.gols_fora) {
                        tc.v += 1;
                        tc.pts += 3;
                        tc.form.push("W");
                        tf.d += 1;
                        tf.form.push("L");
                    } else if (m.gols_casa < m.gols_fora) {
                        tf.v += 1;
                        tf.pts += 3;
                        tf.form.push("W");
                        tc.d += 1;
                        tc.form.push("L");
                    } else {
                        tc.e += 1;
                        tc.pts += 1;
                        tc.form.push("D");
                        tf.e += 1;
                        tf.pts += 1;
                        tf.form.push("D");
                    }
                    tc.sg = tc.gp - tc.gc;
                    tf.sg = tf.gp - tf.gc;
                });

                return Object.values(table)
                    .sort((a, b) => {
                        if (b.pts !== a.pts) return b.pts - a.pts;
                        if (b.v !== a.v) return b.v - a.v;
                        return b.sg - a.sg;
                    })
                    .map((item, idx) => ({ ...item, rank: idx + 1 }));
            };

            const standings = calculateStandings();
            const nextMatch = matches.find(m => !m.encerrada) || matches[0];

            return (
                <div className="relative min-h-screen bg-dark-base text-white overflow-hidden pb-16 z-10">
                    
                    {/* Background Aurora Glow */}
                    <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
                        <motion.div 
                            animate={{
                                x: [0, 60, -40, 0],
                                y: [0, -50, 70, 0],
                                scale: [1, 1.1, 0.9, 1]
                            }}
                            transition={{
                                duration: 20,
                                repeat: Infinity,
                                ease: "easeInOut"
                            }}
                            className="absolute w-[500px] h-[500px] rounded-full bg-gradient-to-tr from-[#ff0055]/10 to-[#d946ef]/5 filter blur-[130px] top-[-10%] left-[-10%]"
                        />
                        <motion.div 
                            animate={{
                                x: [0, -80, 40, 0],
                                y: [0, 60, -50, 0],
                                scale: [1, 0.95, 1.05, 1]
                            }}
                            transition={{
                                duration: 24,
                                repeat: Infinity,
                                ease: "easeInOut"
                            }}
                            className="absolute w-[600px] h-[600px] rounded-full bg-gradient-to-br from-[#06b6d4]/10 to-[#14b8a6]/5 filter blur-[150px] bottom-[5%] right-[-10%]"
                        />
                    </div>

                    {/* Header */}
                    <header className="sticky top-0 z-50 w-full bg-dark-base/60 backdrop-blur-xl border-b border-white/[0.05]">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            
                            <div className="flex items-center gap-2 cursor-pointer">
                                <div className="p-2 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center">
                                    <i className="fa-solid fa-shield-halved text-neon-pink text-lg"></i>
                                </div>
                                <span className="text-lg font-black tracking-wider bg-gradient-to-r from-neon-pink to-neon-cyan bg-clip-text text-transparent">
                                    LIGA VLS
                                </span>
                            </div>

                            <nav className="relative flex items-center gap-1 bg-white/[0.03] border border-white/5 p-1 rounded-full backdrop-blur-md">
                                {[
                                    { id: "championship", label: "Campeonato", icon: "fa-trophy" },
                                    { id: "news", label: "Notícias", icon: "fa-newspaper" }
                                ].map(tab => {
                                    const isActive = activeTab === tab.id;
                                    return (
                                        <button
                                            key={tab.id}
                                            onClick={() => setActiveTab(tab.id)}
                                            className={`relative flex items-center gap-2 px-5 py-2 rounded-full text-xs font-semibold uppercase tracking-wider transition-colors duration-300 z-10 ${
                                                isActive ? 'text-white font-extrabold' : 'text-slate-400 hover:text-white'
                                            }`}
                                        >
                                            {isActive && (
                                                <motion.div
                                                    layoutId="active-pill"
                                                    className="absolute inset-0 bg-gradient-to-r from-[#ff0055]/85 to-[#06b6d4]/85 rounded-full -z-10 shadow-[0_0_15px_rgba(255,0,85,0.3)]"
                                                    transition={{ type: "spring", stiffness: 380, damping: 30 }}
                                                />
                                            )}
                                            <i className={`fa-solid ${tab.icon} text-xs`}></i>
                                            {tab.label}
                                        </button>
                                    );
                                })}
                            </nav>

                            <a href="/paineladm" className="relative overflow-hidden group bg-gradient-to-r from-neon-pink to-[#db2777] text-white text-xs font-bold uppercase tracking-wider px-5 py-2.5 rounded-full shadow-[0_0_20px_rgba(255,0,85,0.25)] hover:shadow-[0_0_35px_rgba(6,182,212,0.35)] transition-all duration-300 border border-white/10">
                                <span className="relative z-10 flex items-center gap-2">
                                    Painel Admin <i className="fa-solid fa-arrow-right text-xs"></i>
                                </span>
                                <span className="absolute inset-0 w-full h-full bg-gradient-to-r from-white/0 via-white/20 to-white/0 transform -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-out" />
                            </a>

                        </div>
                    </header>

                    {/* Main content */}
                    <main className="max-w-7xl mx-auto px-6 mt-8 relative z-10">
                        <AnimatePresence mode="wait">
                            
                            {activeTab === "championship" ? (
                                <motion.div
                                    key="championship-tab"
                                    variants={containerVariants}
                                    initial="hidden"
                                    animate="visible"
                                    exit="hidden"
                                    className="grid grid-cols-1 lg:grid-cols-3 gap-6"
                                >
                                    {/* Selector */}
                                    <motion.div variants={itemVariants} className="lg:col-span-3 flex justify-between items-center bg-white/[0.02] border border-white/5 p-4 rounded-2xl backdrop-blur-md">
                                        <div className="flex items-center gap-2">
                                            <i className="fa-solid fa-trophy text-neon-pink text-base"></i>
                                            <span className="font-extrabold text-sm uppercase tracking-wider text-slate-300">Escolha o Campeonato Ativo:</span>
                                        </div>
                                        <select 
                                            value={selectedCampId} 
                                            onChange={(e) => setSelectedCampId(e.target.value)}
                                            className="bg-dark-card border border-white/10 px-4 py-2 rounded-xl text-xs font-bold text-white outline-none cursor-pointer hover:border-white/20 transition-all"
                                        >
                                            <option value="">Nenhum campeonato ativo</option>
                                            {championships.map(c => (
                                                <option key={c.id} value={c.id}>{c.nome}</option>
                                            ))}
                                        </select>
                                    </motion.div>

                                    {/* PRÓXIMO CONFRONTO */}
                                    {nextMatch ? (
                                        <motion.div 
                                            variants={itemVariants} 
                                            className="lg:col-span-3 bg-white/[0.02] border border-white/5 rounded-3xl p-8 backdrop-blur-xl flex flex-col md:flex-row items-center justify-between gap-8 relative overflow-hidden group hover:border-white/10 transition-colors duration-300"
                                        >
                                            <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-neon-pink via-transparent to-neon-cyan opacity-60" />
                                            
                                            <div className="flex-1 flex items-center justify-around w-full">
                                                <div className="flex flex-col items-center gap-3 text-center">
                                                    <div className="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform duration-300">
                                                        <i className="fa-solid fa-shield-halved text-neon-pink text-2xl"></i>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-extrabold text-base text-white">{nextMatch.time_casa}</h4>
                                                        <span className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Mandante</span>
                                                    </div>
                                                </div>

                                                <div className="flex flex-col items-center gap-2">
                                                    {nextMatch.gols_casa !== null && nextMatch.gols_fora !== null ? (
                                                        <span className="text-3xl font-black text-neon-cyan bg-white/5 border border-white/5 px-4 py-2 rounded-xl">
                                                            {nextMatch.gols_casa} - {nextMatch.gols_fora}
                                                        </span>
                                                    ) : (
                                                        <span className="bg-gradient-to-r from-neon-pink to-neon-cyan bg-clip-text text-transparent font-black text-3xl italic">
                                                            VS
                                                        </span>
                                                    )}
                                                    <span className="text-[9px] uppercase font-bold tracking-widest text-slate-400 bg-white/5 px-3 py-1 rounded-full border border-white/5">
                                                        {nextMatch.rodada}
                                                    </span>
                                                </div>

                                                <div className="flex flex-col items-center gap-3 text-center">
                                                    <div className="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform duration-300">
                                                        <i className="fa-solid fa-shield-halved text-neon-cyan text-2xl"></i>
                                                    </div>
                                                    <div>
                                                        <h4 className="font-extrabold text-base text-white">{nextMatch.time_fora}</h4>
                                                        <span className="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Visitante</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="hidden md:block w-[1px] h-28 bg-white/10" />

                                            <div className="w-full md:w-80 flex flex-col gap-3 text-center md:text-left">
                                                <div className="flex items-center justify-center md:justify-start gap-2 text-neon-pink">
                                                    <i className="fa-solid fa-clock text-neon-pink animate-pulse text-sm"></i>
                                                    <span className="text-[10px] font-extrabold uppercase tracking-widest text-neon-pink">JOGO EM FOCO</span>
                                                </div>
                                                <h3 className="text-xl font-black text-white">
                                                    {nextMatch.data_jogo ? new Date(nextMatch.data_jogo).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }) : "Horário a definir"}
                                                </h3>
                                                {nextMatch.video_url && (
                                                    <a href={nextMatch.video_url} target="_blank" className="flex items-center justify-center md:justify-start gap-2 text-xs font-bold text-neon-cyan hover:underline">
                                                        <i className="fa-solid fa-tv text-red-500 text-sm"></i> Assistir Transmissão
                                                    </a>
                                                )}

                                                <div className="flex gap-2 justify-center md:justify-start mt-1">
                                                    {[
                                                        { val: countdown.days, unit: "d" },
                                                        { val: countdown.hours, unit: "h" },
                                                        { val: countdown.minutes, unit: "m" },
                                                        { val: countdown.seconds, unit: "s" }
                                                    ].map((t, idx) => (
                                                        <div key={idx} className="flex flex-col items-center bg-white/5 border border-white/5 px-3 py-1.5 rounded-xl min-w-[45px] backdrop-blur-md">
                                                            <span className="text-xs font-black text-neon-cyan tracking-wide">{String(t.val).padStart(2, '0')}</span>
                                                            <span className="text-[8px] uppercase font-bold text-slate-500">{t.unit}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </motion.div>
                                    ) : (
                                        <div className="lg:col-span-3 text-center p-8 bg-white/[0.02] border border-white/5 rounded-3xl text-slate-400 text-sm">Nenhum confronto cadastrado ainda para este campeonato.</div>
                                    )}

                                    {/* CLASSIFICAÇÃO */}
                                    <motion.div 
                                        variants={itemVariants}
                                        className="lg:col-span-2 bg-white/[0.02] border border-white/5 rounded-3xl p-6 backdrop-blur-xl"
                                    >
                                        <div className="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
                                            <h3 className="text-sm font-extrabold flex items-center gap-2 text-white">
                                                <i className="fa-solid fa-trophy text-neon-pink text-base"></i> TABELA DE CLASSIFICAÇÃO
                                            </h3>
                                        </div>

                                        <div className="overflow-x-auto">
                                            {standings.length > 0 ? (
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="border-b border-white/5 text-slate-400 text-[10px] uppercase font-bold tracking-widest">
                                                            <th className="py-3 px-2">Pos</th>
                                                            <th className="py-3 px-2">Time</th>
                                                            <th className="py-3 px-2 text-center">P</th>
                                                            <th className="py-3 px-2 text-center">J</th>
                                                            <th className="py-3 px-2 text-center">V</th>
                                                            <th className="py-3 px-2 text-center">SG</th>
                                                            <th className="py-3 px-2 text-right">Form</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-white/[0.02] text-xs">
                                                        {standings.map((t, idx) => {
                                                            const isQualifyZone = idx < 4;
                                                            return (
                                                                <tr key={idx} className="hover:bg-white/[0.015] transition-all">
                                                                    <td className="py-3 px-2">
                                                                        <span className={`font-bold flex items-center justify-center w-5 h-5 rounded-lg text-[10px] ${
                                                                            isQualifyZone 
                                                                                ? 'bg-gradient-to-r from-neon-pink/20 to-neon-pink/10 text-neon-pink border border-neon-pink/20' 
                                                                                : 'text-slate-400 bg-white/5 border border-white/5'
                                                                        }`}>
                                                                            {t.rank}
                                                                        </span>
                                                                    </td>
                                                                    <td className="py-3 px-2 font-bold text-white">{t.nome}</td>
                                                                    <td className="py-3 px-2 text-center font-extrabold text-neon-cyan">{t.pts}</td>
                                                                    <td className="py-3 px-2 text-center text-slate-400">{t.j}</td>
                                                                    <td className="py-3 px-2 text-center text-slate-400">{t.v}</td>
                                                                    <td className="py-3 px-2 text-center font-semibold text-slate-300">{t.sg > 0 ? `+${t.sg}` : t.sg}</td>
                                                                    <td className="py-3 px-2">
                                                                        <div className="flex justify-end gap-1">
                                                                            {t.form.slice(-5).map((res, fIdx) => (
                                                                                <span key={fIdx}>
                                                                                    {res === "W" && <i className="fa-solid fa-circle-check text-emerald-500 text-sm"></i>}
                                                                                    {res === "L" && <i className="fa-solid fa-circle-xmark text-rose-500 text-sm"></i>}
                                                                                    {res === "D" && <i className="fa-solid fa-circle-minus text-amber-500 text-sm"></i>}
                                                                                </span>
                                                                            ))}
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            ) : (
                                                <div className="text-center py-8 text-slate-400 text-xs">Os placares dos confrontos ainda não foram lançados para gerar a classificação.</div>
                                            )}
                                        </div>
                                    </motion.div>

                                    {/* ARTILHARIA & NOTAS */}
                                    <div className="flex flex-col gap-6">
                                        <motion.div 
                                            variants={itemVariants}
                                            className="bg-white/[0.02] border border-white/5 rounded-3xl p-6 backdrop-blur-xl"
                                        >
                                            <div className="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
                                                <h3 className="text-sm font-extrabold flex items-center gap-2 text-white">
                                                    <i className="fa-solid fa-soccer-ball text-neon-cyan text-base"></i> ARTILHARIA & NOTAS
                                                </h3>
                                            </div>

                                            <div className="flex flex-col gap-3">
                                                {leaguePlayers.length > 0 ? (
                                                    leaguePlayers.slice(0, 5).map((p, idx) => (
                                                        <div key={idx} className="flex items-center justify-between bg-white/[0.015] border border-white/5 p-3 rounded-xl hover:bg-white/[0.03] transition-all">
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-xs font-black text-neon-pink w-4">{idx+1}</span>
                                                                <div>
                                                                    <h4 className="text-xs font-bold text-white">{p.nome}</h4>
                                                                    <span className="text-[9px] text-slate-500 font-semibold uppercase">{p.time}</span>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-3 text-right">
                                                                <div className="flex flex-col">
                                                                    <span className="text-[10px] font-black text-neon-cyan">{p.gols} Gols</span>
                                                                    <span className="text-[8px] font-bold text-slate-400">{p.assistencias} Ast</span>
                                                                </div>
                                                                <span className="text-xs font-black text-[#f59e0b] bg-[#f59e0b]/10 border border-[#f59e0b]/20 px-2 py-0.5 rounded-lg">
                                                                    {p.nota_media.toFixed(2)}
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-center py-6 text-slate-400 text-xs">Sem estatísticas salvas para este campeonato.</div>
                                                )}
                                            </div>
                                        </motion.div>
                                    </div>

                                    {/* CALENDÁRIO */}
                                    <motion.div 
                                        variants={itemVariants}
                                        className="lg:col-span-3 bg-white/[0.02] border border-white/5 rounded-3xl p-6 backdrop-blur-xl"
                                    >
                                        <div className="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
                                            <h3 className="text-sm font-extrabold flex items-center gap-2 text-white">
                                                <i className="fa-solid fa-calendar-days text-neon-pink text-base"></i> CALENDÁRIO DA LIGA
                                            </h3>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            {matches.slice(0, 6).map((m, idx) => (
                                                <div 
                                                    key={idx} 
                                                    className="group relative overflow-hidden bg-dark-base/50 border border-white/5 p-4 rounded-xl flex flex-col gap-3 hover:border-white/15 transition-all cursor-pointer"
                                                >
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-[8px] uppercase font-black text-neon-cyan bg-neon-cyan/10 px-2 py-0.5 rounded-full border border-neon-cyan/20">{m.rodada}</span>
                                                        <span className="text-[9px] font-semibold text-slate-400">
                                                            {m.data_jogo ? new Date(m.data_jogo).toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'}) : 'A confirmar'}
                                                        </span>
                                                    </div>
                                                    
                                                    <div className="flex justify-around items-center my-1">
                                                        <span className="text-[11px] font-bold text-white truncate w-16 text-center">{m.time_casa}</span>
                                                        <span className="text-slate-600 font-extrabold italic text-[10px]">
                                                            {m.encerrada ? `${m.gols_casa} - ${m.gols_fora}` : 'VS'}
                                                        </span>
                                                        <span className="text-[11px] font-bold text-white truncate w-16 text-center">{m.time_fora}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </motion.div>

                                </motion.div>
                            ) : (
                                <motion.div
                                    key="news-tab"
                                    variants={containerVariants}
                                    initial="hidden"
                                    animate="visible"
                                    exit="hidden"
                                    className="grid grid-cols-1 md:grid-cols-3 gap-6"
                                >
                                    {news.length > 0 ? (
                                        news.map((article) => (
                                            <motion.article 
                                                key={article.id}
                                                variants={itemVariants}
                                                className="group cursor-pointer bg-white/[0.02] border border-white/5 rounded-3xl overflow-hidden backdrop-blur-xl hover:border-white/10 transition-all duration-300 flex flex-col"
                                            >
                                                <div className="w-full h-48 overflow-hidden relative bg-white/5">
                                                    <img 
                                                        src={article.imagem_url || "https://i.ibb.co/C5B7BBjS/image.png"} 
                                                        alt={article.titulo} 
                                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out" 
                                                        onerror="this.src='https://i.ibb.co/C5B7BBjS/image.png'"
                                                    />
                                                    <span className="absolute top-4 left-4 z-20 text-[8px] uppercase font-black tracking-widest bg-gradient-to-r from-neon-pink to-neon-cyan px-2.5 py-1 rounded-full border border-white/10">
                                                        Notícia
                                                    </span>
                                                </div>

                                                <div className="p-6 flex flex-col gap-3 flex-1">
                                                    <span className="text-[9px] font-semibold text-slate-500 flex items-center gap-1">
                                                        <i className="fa-solid fa-clock text-slate-500 text-xs"></i> {new Date(article.data_publicacao).toLocaleDateString('pt-BR', { dateStyle: 'long' })}
                                                    </span>
                                                    <h3 className="text-base font-extrabold text-white leading-snug group-hover:text-neon-cyan transition-colors duration-300">
                                                        {article.titulo}
                                                    </h3>
                                                    <p className="text-xs text-slate-400 leading-relaxed font-medium">
                                                        {article.subtitulo || article.conteudo}
                                                    </p>
                                                </div>
                                            </motion.article>
                                        ))
                                    ) : (
                                        <div className="col-span-3 text-center py-12 text-slate-400">Nenhuma notícia publicada no mural ainda.</div>
                                    )}
                                </motion.div>
                            )}

                        </AnimatePresence>
                    </main>

                    {/* Footer */}
                    <footer className="max-w-7xl mx-auto px-6 mt-16 pt-8 border-t border-white/[0.05] flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
                        <div className="flex flex-col items-center md:items-start gap-1">
                            <span className="text-xs font-bold text-white">LIGA DE FUTEBOL VLS</span>
                            <span className="text-[10px] text-slate-500 font-medium">© 2026 Liga VLS. Todos os direitos reservados. Design System Premium Liquid Glass.</span>
                        </div>
                        <div className="flex gap-4">
                            <a href="https://instagram.com" target="_blank" className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
                                <i className="fa-brands fa-instagram text-sm"></i>
                            </a>
                            <a href="https://youtube.com" target="_blank" className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
                                <i className="fa-brands fa-youtube text-sm"></i>
                            </a>
                            <a href="https://discord.com" target="_blank" className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
                                <i className="fa-brands fa-discord text-sm"></i>
                            </a>
                        </div>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
